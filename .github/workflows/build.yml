name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets into environment.prod.ts
        run: |
          sed -i "s|YOUTUBE_API_KEY_PLACEHOLDER|${{ secrets.YOUTUBE_API_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|SPOTIFY_CLIENT_ID_PLACEHOLDER|${{ secrets.SPOTIFY_CLIENT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|SPOTIFY_CLIENT_SECRET_PLACEHOLDER|${{ secrets.SPOTIFY_CLIENT_SECRET }}|g" src/environments/environment.prod.ts
          sed -i "s|SPOTIFY_REDIRECT_URI_PLACEHOLDER|${{ secrets.SPOTIFY_REDIRECT_URI }}|g" src/environments/environment.prod.ts

      - name: Build production
        run: npx ng build --configuration=production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
